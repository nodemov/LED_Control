<!doctype html>

<head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">

        <title>Mini Project</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css"
                integrity="sha512-+4zCK9k+qNFUR5X+cKL9EIR+ZOhtIloNl9GIKS57V1MyNsYpYcUrUeQc9vNfzsWfV28IaLL3i96P9sdNyeRssA=="
                crossorigin="anonymous" />
        <script src="socket.io/socket.io.js"></script>
</head>

<body>
        <div>
                <div style="margin-bottom: 80px;">
                        <i id="bulb" class="fas fa-lightbulb bulb-off"></i>
                        <br>
                        <h1>เลื่อนเพื่อเพิ่มลดแสง LED</h1>
                        <br>
                        <i class="fas fa-adjust"></i> <input type="range" id="inputSlider" min="0" max="255" value="50"
                                step="1" oninput="showValue(this.value)" /> <i class="fas fa-sun"></i>
                </div>
                <div style="margin-top: 60px;">
                        <span id="outputText">50</span>
                </div>

        </div>
        <script type="text/javascript">
                var socket = io.connect();

                socket.on('led', function (data) {
                        var value = Number(data.value);
                        document.getElementById("inputSlider").value = value;
                        document.getElementById("outputText").innerHTML = value;
                        updateBulb(value);
                });

                function updateBulb(value) {
                        var bulb = document.getElementById('bulb');
                        if (value === 0) {
                                bulb.classList.remove('bulb-on');
                                bulb.classList.add('bulb-off');
                        } else {
                                bulb.classList.remove('bulb-off');
                                bulb.classList.add('bulb-on');
                        }
                }

                function showValue(newValue) {
                        var value = Number(newValue);
                        document.getElementById("outputText").innerHTML = value;
                        socket.emit('led', { value: value });
                        updateBulb(value);
                }

                updateBulb(Number(document.getElementById("inputSlider").value));
        </script>

</body>

</html>
